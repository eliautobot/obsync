name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Formatting
        run: uv run ruff format --check .
      - name: Tests with coverage
        run: |
          uv run coverage run -m pytest -q
          uv run coverage report

  docker:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t obsync:ci .
      - name: Start container
        run: |
          mkdir -p "$RUNNER_TEMP/obsync-vault" "$RUNNER_TEMP/obsync-data"
          docker run -d --name obsync-ci \
            --user "$(id -u):$(id -g)" \
            -e OBSYNC_ADMIN_USERNAME=ci-admin \
            -e OBSYNC_ADMIN_PASSWORD=ci-test-password \
            -v "$RUNNER_TEMP/obsync-vault:/vault" \
            -v "$RUNNER_TEMP/obsync-data:/data" \
            -p 127.0.0.1:7769:7769 obsync:ci
      - name: Wait for health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:7769/api/v1/health; then exit 0; fi
            sleep 2
          done
          docker logs obsync-ci
          exit 1
      - name: Smoke test username/password login
        run: |
          curl --fail --silent --show-error \
            --cookie-jar "$RUNNER_TEMP/obsync-cookies" \
            --header 'Content-Type: application/json' \
            --data '{"username":"ci-admin","password":"ci-test-password","remember":false}' \
            http://127.0.0.1:7769/api/v1/auth/login
          curl --fail --silent --show-error \
            --cookie "$RUNNER_TEMP/obsync-cookies" \
            http://127.0.0.1:7769/api/v1/admin/session
      - name: Container logs
        if: always()
        run: docker logs obsync-ci || true
