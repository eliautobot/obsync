name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  agent-binaries:
    name: Agent binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: obsync-agent-linux-x64
            extension: ""
          - os: windows-latest
            artifact: obsync-agent-windows-x64
            extension: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install uv
      - run: uv sync --extra dev
      - name: Build standalone agent
        shell: bash
        run: >-
          uv run pyinstaller --noconfirm --clean --onefile
          --collect-all obsync --name "${{ matrix.artifact }}" scripts/obsync_entry.py
      - name: Build Obsync Desktop for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: >-
          uv run pyinstaller --noconfirm --clean --onefile --windowed
          --collect-all obsync --hidden-import tkinter
          --name "obsync-desktop-windows-x64" scripts/obsync_desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.extension }}
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: obsync-desktop-windows-x64
          path: dist/obsync-desktop-windows-x64.exe

  container:
    needs: [agent-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: obsync-desktop-windows-x64
          path: src/obsync/downloads
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    needs: [agent-binaries, container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: obsync-*
          path: release-artifacts
          merge-multiple: true
      - name: Create SHA-256 checksums
        shell: bash
        run: |
          cd release-artifacts
          sha256sum obsync-* > SHA256SUMS.txt
      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$notes" ]]; then
            gh release create "${GITHUB_REF_NAME}" release-artifacts/* \
              --notes-file "$notes" --title "Obsync ${GITHUB_REF_NAME}"
          else
            gh release create "${GITHUB_REF_NAME}" release-artifacts/* \
              --generate-notes --title "Obsync ${GITHUB_REF_NAME}"
          fi
